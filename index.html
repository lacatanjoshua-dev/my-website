<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    padding: 60px 20px;
    text-align: center;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    animation: fadeIn 2s ease-in;
}

h1 {
    font-size: 40px;
}

section {
    padding: 40px;
    margin: 20px;
    background: #1e293b;
    border-radius: 15px;
    animation: slideUp 1s ease;
}

img {
    width: 200px;
    border-radius: 15px;
    margin-top: 15px;
}

a {
    color: #38bdf8;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}
</style>
</head>

<body>

<header>
    <h1>👋 Hello, I'm YOUR NAME</h1>
    <p>Section: YOUR SECTION</p>
</header>

<section>
    <h2>About Me</h2>
    <p>I am a student learning how web servers and file servers work.</p>
</section>

<section>
    <h2>My Photo (From File Server)</h2>
    <img src="https://drive.google.com/file/d/1PgYOhs3aqeM21Nv41fWROsBQEXilqXL4/view?usp=sharing">
    <p>This image is stored in a file server and displayed using a web server.</p>
</section>

<section>
    <h2>My Files</h2>
    <p>
        <a href="https://drive.google.com/file/d/14coHJRn0gz6VCcU0mul4-e-clq116_Hj/view?usp=sharing" target="_blank">
            📄 Open My File (Google Drive)
        </a>
    </p>
</section>

<footer>
    <p>© 2026 | My Portfolio Website</p>
</footer>

</body>
</html>
